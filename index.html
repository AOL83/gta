<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aurora MetaComputer Test Window</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#030711;color:#eaf7ff;font-family:Arial,Helvetica,sans-serif}
body{background:radial-gradient(circle at 25% 18%,#142445,#030711 70%)}
#app{min-height:100%;display:grid;grid-template-rows:58px 1fr}
nav{height:58px;display:flex;align-items:center;gap:12px;padding:0 16px;background:rgba(4,8,16,.94);border-bottom:1px solid rgba(212,175,55,.3)}
.logo{font-weight:900;font-size:18px;background:linear-gradient(135deg,#d4af37,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent}
main{padding:16px;display:grid;grid-template-columns:360px 1fr 390px;gap:14px}
.panel{background:linear-gradient(180deg,rgba(5,10,18,.84),rgba(0,4,10,.92));border:1px solid rgba(0,255,200,.28);box-shadow:0 0 22px rgba(0,255,200,.1);border-radius:16px;padding:14px}
.title{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#00ffc8;font-weight:800;margin-bottom:10px}
.small{font-size:13px;line-height:1.45;color:#b9c9d7}
button,input,textarea{font:inherit}
button{border:1px solid rgba(0,255,200,.36);background:rgba(0,255,200,.08);color:#eaffff;border-radius:10px;padding:10px 12px;margin:4px 4px 4px 0;cursor:pointer}
button:hover{background:rgba(0,255,200,.18)}
button.primary{border-color:#d4af37;color:#ffd66e;background:rgba(212,175,55,.13)}
input,textarea{width:100%;background:#06101a;color:#eaf7ff;border:1px solid rgba(0,255,200,.25);border-radius:10px;padding:10px}
textarea{height:130px}
.card{border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px;margin:8px 0;background:rgba(255,255,255,.045)}
.log{height:330px;overflow:auto;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap}
.led{display:inline-block;width:11px;height:11px;border-radius:50%;background:#ff4b67;box-shadow:0 0 8px #ff4b67;margin-right:7px}
.led.on{background:#00ffc8;box-shadow:0 0 8px #00ffc8}
#testWindow{height:560px;position:relative;overflow:hidden;border-radius:16px;border:1px solid rgba(212,175,55,.3);background:linear-gradient(90deg,rgba(0,0,0,.58),rgba(0,0,0,.12),rgba(0,0,0,.64)),radial-gradient(circle at 48% 54%,rgba(0,255,200,.16),transparent 20%),linear-gradient(180deg,#0b1728,#05070c 70%)}
#testWindow:before{content:"LIVE TEST WINDOW";position:absolute;top:16px;left:16px;padding:8px 12px;border:1px solid rgba(0,255,200,.25);border-radius:999px;background:rgba(0,0,0,.5);font-size:12px;color:#bff}
.floor{position:absolute;left:8%;right:8%;bottom:-8%;height:56%;background:linear-gradient(90deg,#111923,#080d13);transform:rotateX(64deg);border:1px solid rgba(0,255,200,.15)}
.room{position:absolute;left:12%;top:12%;width:40%;height:54%;border:1px solid rgba(212,175,55,.28);background:linear-gradient(135deg,rgba(60,80,110,.24),rgba(10,15,26,.72));box-shadow:inset 0 0 70px rgba(0,0,0,.55)}
.terminal{position:absolute;left:16%;top:28%;width:16%;height:18%;background:#07101b;border:1px solid #00ffc8;box-shadow:0 0 22px rgba(0,255,200,.34)}
.garage{position:absolute;right:12%;bottom:18%;width:32%;height:26%;background:linear-gradient(90deg,#0b1118,#171e25);transform:skewX(-10deg);border:1px solid rgba(255,255,255,.12)}
.car{position:absolute;right:24%;bottom:28%;width:110px;height:46px;background:linear-gradient(135deg,#164c74,#07101b);border:1px solid #60a5fa;box-shadow:0 0 20px rgba(96,165,250,.25);border-radius:10px}
.portal{position:absolute;right:10%;top:18%;width:110px;height:160px;border-radius:50%;border:5px solid #00ffc8;box-shadow:0 0 35px rgba(0,255,200,.6)}
.avatar{position:absolute;left:46%;bottom:28%;width:32px;height:74px;background:linear-gradient(#00ffc8,#0b6b58);border-radius:16px 16px 8px 8px;box-shadow:0 0 18px rgba(0,255,200,.6)}
.testStep{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:13px}.pass{color:#00ffc8}.fail{color:#ff4b67}.wait{color:#ffd66e}
@media(max-width:1000px){main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
<nav><div class="logo">⚡ Aurora MetaComputer Test Window</div><span class="small">Add Launcher → File Explorer → Run Epic → test results visible</span></nav>
<main>
<section class="panel">
<div class="title">Launcher Control</div>
<button class="primary" onclick="openFilePicker()">Add Launcher</button>
<input id="filePicker" type="file" accept=".lnk,.url,.exe,.bat,.cmd,.ps1" multiple style="display:none">
<div id="launcherCards"></div>

<div class="title" style="margin-top:16px">Bridge</div>
<p><span id="bridgeLed" class="led"></span><span id="bridgeText">Not checked</span></p>
<input id="bridgeUrl" value="http://127.0.0.1:8769">
<button onclick="checkBridge()">Check Bridge</button>
<button onclick="runSelectedEpic()">Run Epic Games</button>
</section>

<section class="panel">
<div id="testWindow">
<div class="floor"></div><div class="room"></div><div class="terminal"></div><div class="garage"></div><div class="car"></div><div class="portal"></div><div class="avatar"></div>
</div>
<div class="title" style="margin-top:12px">Test checklist</div>
<div id="checklist"></div>
</section>

<section class="panel">
<div class="title">Runtime Log</div>
<div id="log" class="log">Aurora test window loaded.</div>
<div class="title" style="margin-top:14px">Builder Dock Packet</div>
<textarea id="packetText"></textarea>
<button onclick="copyPacket()">Copy Packet</button>
<button onclick="downloadPacket()">Download Packet</button>
</section>
</main>
</div>
<script>
let launchers=JSON.parse(localStorage.getItem("aurora_test_launchers")||"[]");
let tests={page:true,file:false,bridge:false,run:false};
const packet={project:"Aurora Builder Dock Zero",loadIn:"polished futuristic workbay first",zones:["spawn pad","Unreal builder terminal","AI Architect terminal","garage","outside greybox strip","enemy test pad","portal placeholder"],features:["Epic/Unreal launcher handoff","mission radar","vehicle test","NPC concierge","save station"]};

function bridge(){return document.getElementById("bridgeUrl").value.replace(/\/$/,"")}
function log(m){const el=document.getElementById("log");el.textContent+="\n"+new Date().toLocaleTimeString()+"  "+m;el.scrollTop=el.scrollHeight;renderChecklist()}
function mark(k,v){tests[k]=v;renderChecklist()}
function renderChecklist(){
const labels={page:"HTML control nest loaded",file:"Launcher selected through File Explorer",bridge:"Local bridge online",run:"Run command sent to Epic launcher"};
checklist.innerHTML=Object.keys(labels).map(k=>`<div class="testStep"><b class="${tests[k]?'pass':'wait'}">${tests[k]?'PASS':'WAIT'}</b><span>${labels[k]}</span></div>`).join("");
}
function openFilePicker(){document.getElementById("filePicker").click()}
filePicker.addEventListener("change",e=>{
for(const f of [...e.target.files]){
 if(!launchers.some(x=>x.name===f.name))launchers.push({name:f.name,added:new Date().toLocaleString()});
 log("Launcher added: "+f.name);
 mark("file",true);
}
localStorage.setItem("aurora_test_launchers",JSON.stringify(launchers));renderLaunchers();e.target.value="";
});
function renderLaunchers(){
launcherCards.innerHTML=launchers.length?launchers.map((x,i)=>`<div class="card"><b>${esc(x.name)}</b><div class="small">${esc(x.added)}</div><button class="primary" onclick="runLauncher(${i})">Run</button><button onclick="removeLauncher(${i})">Remove</button></div>`).join(""):"<div class='card small'>No launcher selected yet.</div>";
}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function removeLauncher(i){log("Removed: "+launchers[i].name);launchers.splice(i,1);localStorage.setItem("aurora_test_launchers",JSON.stringify(launchers));renderLaunchers();mark("file",launchers.length>0)}
async function checkBridge(){
try{const r=await fetch(bridge()+"/status",{cache:"no-store"});const j=await r.json();bridgeLed.classList.add("on");bridgeText.textContent="Bridge online";mark("bridge",true);log("Bridge online. Folder: "+j.launchersFolder)}
catch(e){bridgeLed.classList.remove("on");bridgeText.textContent="Bridge offline";mark("bridge",false);log("Bridge offline: "+e.message)}
}
async function runSelectedEpic(){
const epic=launchers.find(x=>x.name.toLowerCase().includes("epic"))||launchers[0];
if(!epic){log("No launcher selected. Press Add Launcher first.");return}
await runByName(epic.name);
}
async function runLauncher(i){await runByName(launchers[i].name)}
async function runByName(name){
try{log("Run requested: "+name);const r=await fetch(bridge()+"/launch?name="+encodeURIComponent(name),{cache:"no-store"});const t=await r.text();log(t);mark("run",t.startsWith("OK"))}
catch(e){log("Run failed: "+e.message);mark("run",false)}
}
function copyPacket(){navigator.clipboard.writeText(JSON.stringify(packet,null,2));log("Packet copied.")}
function downloadPacket(){const blob=new Blob([JSON.stringify(packet,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="builder_dock_zero_packet.json";a.click();URL.revokeObjectURL(a.href);log("Packet downloaded.")}
packetText.value=JSON.stringify(packet,null,2);renderLaunchers();renderChecklist();checkBridge();
</script>
</body>
</html>
