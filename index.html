<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aurora Final HTML Console</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#030711;color:#eaf7ff;font-family:Arial,Helvetica,sans-serif}
body{background:radial-gradient(circle at 25% 18%,#142445,#030711 70%)}
#app{min-height:100%;display:grid;grid-template-rows:58px 1fr}
nav{height:58px;display:flex;align-items:center;gap:12px;padding:0 16px;background:rgba(4,8,16,.94);border-bottom:1px solid rgba(212,175,55,.3)}
.logo{font-weight:900;font-size:18px;background:linear-gradient(135deg,#d4af37,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent}
main{padding:16px;display:grid;grid-template-columns:360px 1fr 390px;gap:14px}
.panel{background:linear-gradient(180deg,rgba(5,10,18,.84),rgba(0,4,10,.92));border:1px solid rgba(0,255,200,.28);box-shadow:0 0 22px rgba(0,255,200,.1);border-radius:16px;padding:14px}
.title{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#00ffc8;font-weight:800;margin-bottom:10px}
.small{font-size:13px;line-height:1.45;color:#b9c9d7}
button,input,textarea{font:inherit}
button{border:1px solid rgba(0,255,200,.36);background:rgba(0,255,200,.08);color:#eaffff;border-radius:10px;padding:10px 12px;margin:4px 4px 4px 0;cursor:pointer}
button:hover{background:rgba(0,255,200,.18)}
button.primary{border-color:#d4af37;color:#ffd66e;background:rgba(212,175,55,.13)}
input,textarea{width:100%;background:#06101a;color:#eaf7ff;border:1px solid rgba(0,255,200,.25);border-radius:10px;padding:10px}
textarea{height:180px}
.card{border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px;margin:8px 0;background:rgba(255,255,255,.045)}
.log{height:330px;overflow:auto;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap}
.pass{color:#00ffc8}.wait{color:#ffd66e}
#view{height:560px;position:relative;overflow:hidden;border-radius:16px;border:1px solid rgba(212,175,55,.3);background:linear-gradient(90deg,rgba(0,0,0,.58),rgba(0,0,0,.12),rgba(0,0,0,.64)),radial-gradient(circle at 48% 54%,rgba(0,255,200,.16),transparent 20%),linear-gradient(180deg,#0b1728,#05070c 70%)}
#view:before{content:"AURORA HTML CONTROL NEST";position:absolute;top:16px;left:16px;padding:8px 12px;border:1px solid rgba(0,255,200,.25);border-radius:999px;background:rgba(0,0,0,.5);font-size:12px;color:#bff}
.floor{position:absolute;left:8%;right:8%;bottom:-8%;height:56%;background:linear-gradient(90deg,#111923,#080d13);transform:rotateX(64deg);border:1px solid rgba(0,255,200,.15)}
.room{position:absolute;left:12%;top:12%;width:40%;height:54%;border:1px solid rgba(212,175,55,.28);background:linear-gradient(135deg,rgba(60,80,110,.24),rgba(10,15,26,.72));box-shadow:inset 0 0 70px rgba(0,0,0,.55)}
.terminal{position:absolute;left:16%;top:28%;width:16%;height:18%;background:#07101b;border:1px solid #00ffc8;box-shadow:0 0 22px rgba(0,255,200,.34)}
.garage{position:absolute;right:12%;bottom:18%;width:32%;height:26%;background:linear-gradient(90deg,#0b1118,#171e25);transform:skewX(-10deg);border:1px solid rgba(255,255,255,.12)}
.car{position:absolute;right:24%;bottom:28%;width:110px;height:46px;background:linear-gradient(135deg,#164c74,#07101b);border:1px solid #60a5fa;box-shadow:0 0 20px rgba(96,165,250,.25);border-radius:10px}
.portal{position:absolute;right:10%;top:18%;width:110px;height:160px;border-radius:50%;border:5px solid #00ffc8;box-shadow:0 0 35px rgba(0,255,200,.6)}
.avatar{position:absolute;left:46%;bottom:28%;width:32px;height:74px;background:linear-gradient(#00ffc8,#0b6b58);border-radius:16px 16px 8px 8px;box-shadow:0 0 18px rgba(0,255,200,.6)}
@media(max-width:1000px){main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
<nav><div class="logo">⚡ Aurora Final HTML Console</div><span class="small">Builder Dock Zero load-in console</span></nav>
<main>
<section class="panel">
<div class="title">Launcher</div>
<button class="primary" onclick="addLauncher()">Add Launcher</button>
<input id="picker" type="file" accept=".lnk,.url,.exe,.bat,.cmd,.ps1" multiple style="display:none">
<div id="launchers"></div>
<div class="title">Actions</div>
<button class="primary" onclick="runEpic()">Run Epic + Blueprint</button>
<button class="primary" onclick="runUnreal()">Run Unreal + Blueprint</button>
<button onclick="copyPacket()">Copy Blueprint</button>
<button onclick="downloadPacket()">Download Blueprint</button>
</section>

<section class="panel">
<div id="view"><div class="floor"></div><div class="room"></div><div class="terminal"></div><div class="garage"></div><div class="car"></div><div class="portal"></div><div class="avatar"></div></div>
<div class="title" style="margin-top:12px">Test Checklist</div>
<div id="checks"></div>
</section>

<section class="panel">
<div class="title">Runtime Log</div>
<div id="log" class="log">Aurora console loaded.</div>
<div class="title" style="margin-top:14px">Blueprint Packet</div>
<textarea id="packet"></textarea>
</section>
</main>
</div>

<script>
const launchers=JSON.parse(localStorage.getItem("aurora_final_launchers")||"[]");
const state={launcher:false,packet:true,protocol:false};

const packet={
project:"Aurora Builder Dock Zero",
loadIn:"User loads directly into polished futuristic builder workbay",
purpose:"Zero-point load-in position for building the reality outside the user node",
dimensions_metres:{width:28,length:36,height:8},
zones:["operator spawn pad","AI Architect terminal","Unreal Builder Bay","garage and vehicle lift","tool wall and workbench","deployment door","outside greybox test strip","enemy test pad","portal placeholder"],
features:["walking","vehicle test","NPC concierge","enemy bot","mission radar","save station","portal placeholder","outside greybox boundary"],
unreal_actions:["open or create AuroraBuilderDockZero project","create Builder_Dock_Zero level","build polished enclosed builder dock first","place player start at operator spawn pad","place AI Architect terminal","place Unreal Builder Bay wall terminal","place garage and vehicle lift","place deployment door to outside greybox test strip","place NPC concierge","place enemy bot test pad","place mission radar markers","save level","prepare play preview"]
};

function log(m){const el=document.getElementById("log");el.textContent+="\n"+new Date().toLocaleTimeString()+"  "+m;el.scrollTop=el.scrollHeight;renderChecks()}
function addLauncher(){document.getElementById("picker").click()}
picker.addEventListener("change",e=>{for(const f of [...e.target.files]){if(!launchers.some(x=>x.name===f.name))launchers.push({name:f.name,added:new Date().toLocaleString()})}localStorage.setItem("aurora_final_launchers",JSON.stringify(launchers));state.launcher=launchers.length>0;renderLaunchers();log("Launcher registered: "+launchers.map(x=>x.name).join(", "));e.target.value=""});
function renderLaunchers(){launchersDiv.innerHTML=launchers.length?launchers.map((x,i)=>`<div class="card"><b>${x.name}</b><div class="small">${x.added}</div><button onclick="runLauncher(${i})">Run Through Aurora Protocol</button><button onclick="removeLauncher(${i})">Remove</button></div>`).join(""):"<div class='card small'>No launcher added.</div>"}
function removeLauncher(i){launchers.splice(i,1);localStorage.setItem("aurora_final_launchers",JSON.stringify(launchers));state.launcher=launchers.length>0;renderLaunchers();renderChecks()}
function protocol(target){const url="aurora://launch?target="+encodeURIComponent(target)+"&blueprint="+encodeURIComponent(JSON.stringify(packet));state.protocol=true;log("Calling protocol: "+url.slice(0,220)+"...");window.location.href=url;setTimeout(()=>log("If nothing opened, aurora:// is not registered on this machine."),1200)}
function runLauncher(i){protocol(launchers[i].name)}
function runEpic(){protocol("EpicGamesLauncher")}
function runUnreal(){protocol("UnrealEngine")}
function copyPacket(){navigator.clipboard.writeText(JSON.stringify(packet,null,2));log("Blueprint copied.")}
function downloadPacket(){const b=new Blob([JSON.stringify(packet,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="builder_dock_zero_packet.json";a.click();URL.revokeObjectURL(a.href);log("Blueprint downloaded.")}
function renderChecks(){checks.innerHTML=`<div><b class="pass">PASS</b> HTML control nest loaded</div><div><b class="pass">PASS</b> Builder Dock Zero blueprint embedded</div><div><b class="${state.launcher?'pass':'wait'}">${state.launcher?'PASS':'WAIT'}</b> Launcher registered</div><div><b class="${state.protocol?'pass':'wait'}">${state.protocol?'PASS':'WAIT'}</b> Protocol command issued</div>`}
const launchersDiv=document.getElementById("launchers");
packet.value=JSON.stringify(packet,null,2);
state.launcher=launchers.length>0;
renderLaunchers();
renderChecks();
</script>
</body>
</html>
